services:
  gellyte:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
    container_name: gellyte
    ports:
      - "8081:8081"
    volumes:
      # Mount your media libraries
      # Use :Z for SELinux compatibility (Podman/Fedora)
      - /path/to/your/movies:/app/media/peliculas:Z
      - /path/to/your/series:/app/media/series:Z
      # Persistence for the database
      - ./config:/app/config:Z
    # Optional: For Podman rootless, you might want to match your host UID inside
    # userns_mode: "keep-id"
    devices:
      # Passthrough de GPU para aceleración por hardware (VAAPI)
      - /dev/dri:/dev/dri
    environment:
      - TZ=Europe/Madrid
      - GELLYTE_DATABASE_PATH=/app/config/gellyte.db
      # Opcional: configurar estas variables si se prefiere no tocar el config.yaml
      # - GELLYTE_TRANSCODER_HARDWARE_ACCELERATION=vaapi
      # - GELLYTE_TRANSCODER_DEFAULT_CODEC=h264_vaapi
    restart: unless-stopped
