services:
  gellyte:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gellyte
    ports:
      "8081:8081"
    volumes:
      # Mount your media libraries
      - /path/to/your/movies:/app/media/peliculas
      - /path/to/your/series:/app/media/series
      # Persistence for the database
      - ./config:/app/config
    environment:
      - TZ=Europe/Madrid
      - DB_PATH=/app/config/gellyte.db
    restart: unless-stopped
