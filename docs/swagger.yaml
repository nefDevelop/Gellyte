basePath: /
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Servidor compatible con Jellyfin escrito en Go.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Gellyte API
  version: "1.0"
paths:
  /System/Info:
    get:
      description: Devuelve detalles del sistema requeridos por el protocolo Jellyfin.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Obtener información detallada del sistema
      tags:
      - System
  /System/Info/Public:
    get:
      description: Devuelve información básica necesaria para que el cliente Jellyfin
        reconozca el servidor.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Obtener información pública del sistema
      tags:
      - System
swagger: "2.0"
